{% set name = "jdcal" %}
{% set version = "1.4.1" %}
{% set sha256 = "472872e096eb8df219c23f2689fc336668bdb43d194094b5cc1707e1640acfc8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - jdcal

about:
  home: https://github.com/phn/jdcal
  license: BSD 2-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: 'Julian dates from proleptic Gregorian and Julian calendars.'

  description: |
    This module contains functions for converting between Julian dates and calendar dates.
  dev_url: https://github.com/phn/jdcal

extra:
  recipe-maintainers:
    - curtisalexander
